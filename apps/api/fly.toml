app = "list-api"
primary_region = "ams"

[build]

[env]
  PORT = "8080"

[deploy]
  release_command = "bun run src/db/migrate.ts"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
